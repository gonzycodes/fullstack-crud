<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Böcker</title>
    <script type="module" src="/main.js"></script>
  </head>
  <body>
    <main>
      <h1>Böcker</h1>

      <form id="book-form">
        <input id="title" name="title" type="text" placeholder="Titel" required />
        <input id="author" name="author" type="text" placeholder="Författare" required />
        <button type="submit">Lägg till bok</button>
      </form>

      <p id="error-message" hidden></p>

      <ul id="books-list"></ul>
    </main>
  </body>
</html>
